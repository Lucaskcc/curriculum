<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K & L's curriculum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <script>
        // 確保圖片載入失敗時的預設圖示
        function imgFallback(img) {
            img.onerror = null;
            img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ccc"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
        }
    </script>
    <style>
        :root {
            /* 整體背景 */
            --bg-page: #eef2f5;
            --app-bg: #ffffff;
            
            /* 布丁狗 (Pompompurin) 暖黃色系 */
            --kcc-light: #FFFBF0;
            --kcc-main: #FDE073;
            --kcc-border: #F5C518;
            --kcc-text: #5C4000;
            
            /* 帕恰狗 (Pochacco) 薄荷綠色系 */
            --lyz-light: #F0FAF4;
            --lyz-main: #A7E4C0;
            --lyz-border: #6BCB97;
            --lyz-text: #0E4729;

            /* Our 按鈕與通用色 */
            --btn-dual: #F0F2F5;
            --btn-dual-text: #4A4A4A;
            --text-main: #333333;
            --text-muted: #777777;
            --active-green: #10B981;
            --white: #ffffff;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 整個 APP 的主視窗 */
        #app-container {
            width: 100%;
            max-width: 1300px;
            background-color: var(--app-bg);
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            min-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* 背景小裝飾 */
        #app-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 120px;
            background: linear-gradient(135deg, var(--kcc-main) 0%, var(--lyz-main) 100%);
            z-index: 0;
            border-radius: 20px 20px 0 0;
            opacity: 0.6;
        }

        /* ================= 動態時鐘樣式 ================= */
        .clock-display {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            font-weight: bold;
            font-size: 0.95rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            border: 2px solid var(--white);
            backdrop-filter: blur(5px);
        }
        .clock-display span.time {
            color: var(--active-green);
            font-size: 1.15rem;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
        }
        .clock-icon {
            width: 18px; height: 18px; fill: var(--text-muted);
        }

        /* ================= 模式 1：手機外框模式 ================= */
        #app-container.mobile-frame {
            max-width: 414px; /* iPhone 寬度 */
            height: 850px;
            min-height: 850px;
            border: 14px solid #1a1a1a;
            border-radius: 45px;
            padding: 15px 10px;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2), inset 0 0 10px rgba(0,0,0,0.05);
        }
        #app-container.mobile-frame::-webkit-scrollbar { width: 0px; }
        #app-container.mobile-frame::before { border-radius: 30px 30px 0 0; }
        
        /* 手機模式或小螢幕時的時鐘調整 */
        @media (max-width: 900px) {
            .clock-display {
                position: static;
                margin-bottom: 10px;
                background: transparent;
                box-shadow: none;
                border: none;
            }
        }
        #app-container.mobile-frame .clock-display {
            position: static;
            margin-bottom: 5px;
            background: transparent;
            box-shadow: none;
            border: none;
            justify-content: center;
        }

        /* 標題與裝飾 */
        .header { text-align: center; margin-bottom: 25px; position: relative; z-index: 1; }
        .header h1 {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 2.5rem;
            color: #333;
            margin: 5px 0;
            letter-spacing: 2px;
        }

        /* ================= 頁籤切換 ================= */
        .tab-switcher {
            display: flex;
            background: #F0F2F5;
            border-radius: 14px;
            padding: 5px;
            margin-bottom: 25px;
            width: 320px;
            max-width: 100%;
            position: relative;
            z-index: 1;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        .tab-btn.active { background: var(--white); color: #222; box-shadow: 0 4px 10px rgba(0,0,0,0.06); }

        /* ================= 控制按鈕 ================= */
        .controls {
            display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap;
            justify-content: center; position: relative; z-index: 1;
        }
        .btn {
            padding: 8px 20px 8px 10px; border: 2px solid transparent; border-radius: 50px;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; gap: 10px; background-color: var(--white);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .btn img {
            width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
            background: #eee; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .btn:active { transform: translateY(2px); }
        .btn-my { color: var(--text-main); }
        .btn-my.active { background-color: var(--kcc-main); border-color: var(--kcc-border); color: var(--kcc-text); transform: scale(1.05); box-shadow: 0 5px 15px rgba(253, 224, 115, 0.6);}
        .btn-bao { color: var(--text-main); }
        .btn-bao.active { background-color: var(--lyz-main); border-color: var(--lyz-border); color: var(--lyz-text); transform: scale(1.05); box-shadow: 0 5px 15px rgba(167, 228, 192, 0.6);}
        .btn-dual { color: var(--text-main); }
        .btn-dual.active { background-color: var(--text-main); color: var(--white); transform: scale(1.05); box-shadow: 0 5px 15px rgba(0,0,0,0.15);}

        /* 視圖容器 */
        .view-section { display: none; width: 100%; flex-direction: column; align-items: center; position: relative; z-index: 1;}
        .view-section.active { display: flex; }

        /* ================= 視圖 A: 傳統網格週課表 ================= */
        .main-wrapper { 
            width: 100%; 
            max-width: 100%;
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
        }
        .main-wrapper.dual-view { flex-direction: row; align-items: flex-start; }
        
        .schedule-container {
            flex: 1; 
            background: var(--white); 
            border-radius: 20px; 
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.04); 
            display: none;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        #container-my { border-top: 6px solid var(--kcc-border); background-color: var(--kcc-light); }
        #container-bao { border-top: 6px solid var(--lyz-border); background-color: var(--lyz-light); }
        .schedule-container.show { display: block; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 5px; min-width: 500px; table-layout: fixed; }
        .person-label { 
            text-align: center; font-size: 1.3rem; font-weight: 900; margin-bottom: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        #container-my .person-label { color: var(--kcc-text); }
        #container-bao .person-label { color: var(--lyz-text); }
        .person-label img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        #container-my th { background-color: var(--kcc-main); color: var(--kcc-text); padding: 12px; border-radius: 10px; }
        #container-bao th { background-color: var(--lyz-main); color: var(--lyz-text); padding: 12px; border-radius: 10px; }
        th:first-child { width: 90px; }
        
        .time-cell-grid { background-color: rgba(255,255,255,0.6); text-align: center; border-radius: 10px; line-height: 1.4; padding: 8px;}
        .time-cell-grid .p-num { font-size: 1.1rem; font-weight: bold; color: var(--text-main);}
        .time-cell-grid .t-range { font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 2px;}
        
        td.course-cell {
            padding: 10px 8px; height: 65px; border-radius: 10px; vertical-align: middle;
            background-color: var(--white); box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            word-wrap: break-word; overflow-wrap: break-word; text-align: center; transition: transform 0.2s;
        }
        td.course-cell:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .course-name { display: block; font-weight: 900; font-size: 0.9rem; margin-bottom: 4px; line-height: 1.2;}
        .instructor, .location { display: block; font-size: 0.75rem; color: var(--text-muted); }
        td.course-cell:empty::after { content: "🐾"; opacity: 0.1; font-size: 1.2rem; }
        .my-item .course-name { color: var(--kcc-text); }
        .bao-item .course-name { color: var(--lyz-text); }

        /* ================= 視圖 B: 今日課程 ================= */
        .today-wrapper {
            width: 100%; display: flex; flex-direction: row; justify-content: center;
            align-items: flex-start; gap: 25px; padding-bottom: 30px;
        }
        .today-col { flex: 1; display: none; flex-direction: column; gap: 15px; max-width: 500px; width: 100%; }
        .today-col.show { display: flex; }

        .today-header-title {
            font-size: 1.3rem; font-weight: 900; margin: 10px 0 5px 5px;
            padding-left: 12px; display: flex; align-items: center; gap: 12px;
        }
        #today-my-col .today-header-title { color: var(--kcc-text); border-left: 5px solid var(--kcc-border); }
        #today-bao-col .today-header-title { color: var(--lyz-text); border-left: 5px solid var(--lyz-border); }
        .today-header-title img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .empty-state {
            text-align: center; padding: 50px 20px; color: var(--text-muted); background: var(--white);
            border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); font-weight: bold; font-size: 1.1rem;
            width: 100%; box-sizing: border-box;
        }

        /* 可互動式課程卡片 */
        .list-card {
            background: var(--white); border-radius: 18px; display: flex; flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid transparent;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; overflow: hidden;
        }
        .list-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.08); }
        #today-my-col .list-card { border-color: rgba(245, 197, 24, 0.4); }
        #today-bao-col .list-card { border-color: rgba(107, 203, 151, 0.4); }

        .list-card-main {
            display: flex; align-items: center; padding: 16px; position: relative; width: 100%; box-sizing: border-box;
        }

        .list-left {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 75px; border-right: 2px dashed #eee; padding-right: 15px; margin-right: 15px;
        }
        .list-period {
            background: var(--bg-page); color: var(--text-main); font-size: 1.5rem; font-weight: 900;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            border-radius: 14px; margin-bottom: 6px; transition: all 0.3s;
        }
        .list-card.ongoing .list-period {
            background: var(--active-green); color: white; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }
        .list-time { font-size: 0.75rem; color: var(--text-muted); text-align: center; line-height: 1.2; white-space: nowrap; }

        .list-right {
            flex: 1; display: flex; flex-direction: column; justify-content: center; padding-right: 60px;
        }
        .list-course-title { font-size: 1.15rem; font-weight: 900; color: var(--text-main); margin-bottom: 8px; }
        .list-details { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 0.85rem; color: var(--text-muted); }
        .detail-item { display: flex; align-items: center; gap: 5px; }
        .icon { width: 16px; height: 16px; fill: currentColor; opacity: 0.6; }

        .badge-container { position: absolute; right: 16px; top: 22px; }
        .status-badge {
            font-size: 0.75rem; padding: 5px 12px; border-radius: 20px; font-weight: bold;
            display: flex; align-items: center; gap: 6px;
        }
        .status-badge.ended { background: var(--bg-page); color: #aaa; }
        .status-badge.upcoming { background: #f0f8ff; color: #4b9beb; border: 1px solid #cce5ff;}
        .status-badge.ongoing { background: #E6F8F1; color: var(--active-green); border: 1px solid #B0EACD; }
        .dot { width: 8px; height: 8px; background: var(--active-green); border-radius: 50%; display: inline-block; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.4;} 100% {opacity:1;} }

        .expand-icon {
            position: absolute; right: 16px; bottom: 16px; width: 20px; height: 20px; fill: #ccc;
            transition: transform 0.3s;
        }
        .list-card.expanded .expand-icon { transform: rotate(180deg); }

        .list-card-extra {
            max-height: 0; opacity: 0; overflow: hidden; transition: all 0.3s ease-out;
            background: #fafafa; padding: 0 16px;
        }
        .list-card.expanded .list-card-extra {
            max-height: 120px; opacity: 1; padding: 16px; border-top: 1px solid #f0f0f0;
        }
        .countdown-text { font-size: 0.95rem; font-weight: bold; color: #444; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .progress-bar-bg { width: 100%; height: 8px; background: #e5e7eb; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--active-green); border-radius: 10px; transition: width 1s linear, background-color 0.3s; }

        .floating-toggle {
            position: fixed; bottom: 30px; right: 30px; background: #222; color: white; border: none;
            padding: 14px 24px; border-radius: 30px; font-size: 1rem; font-weight: bold; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; z-index: 1000; transition: all 0.3s;
        }
        .floating-toggle:hover { background: #000; transform: scale(1.05); }

        /* RWD 適應手機版面 */
        @media (max-width: 900px) {
            .main-wrapper.dual-view { flex-direction: column; }
            .today-wrapper { flex-direction: column; align-items: center; }
            .floating-toggle { display: none; }
            #app-container { border-radius: 0; min-height: 100vh; padding: 15px 10px; }
            body { padding: 0; }
        }

        #app-container.mobile-frame .today-wrapper { flex-direction: column; align-items: center; }
        #app-container.mobile-frame .main-wrapper.dual-view { flex-direction: column; }
    </style>
</head>
<body>

    <button class="floating-toggle" onclick="toggleMobileFrame()" id="frameToggleBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
        切換手機預覽
    </button>

    <div id="app-container">
        <!-- 這是新增的右上角動態時鐘 -->
        <div id="real-time-clock" class="clock-display">
            <svg class="clock-icon" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/><path d="M12.5 7H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
            <span id="date-text"></span> <span id="time-text" class="time"></span>
        </div>

        <div class="header">
            <h1>K & L</h1>
            <p style="color:#666; font-size: 0.9rem; font-weight: bold; margin:0;">Our Schedule 🐾</p>
        </div>

        <div class="tab-switcher">
            <button class="tab-btn active" onclick="switchMainView('grid')">📅 週課表</button>
            <button class="tab-btn" onclick="switchMainView('list')">📋 今日課程</button>
        </div>

        <div class="controls">
            <!-- 已替換為您上傳的正確檔名 -->
            <button class="btn btn-my active" onclick="showPersonMode('my')">
                <img src="我.jpg" alt="Kcc" onerror="imgFallback(this)"> Kcc
            </button>
            <button class="btn btn-bao" onclick="showPersonMode('bao')">
                <img src="寶.jpg" alt="Lyz" onerror="imgFallback(this)"> Lyz
            </button>
            <button class="btn btn-dual" onclick="showPersonMode('dual')">
                <img src="S__48414784.jpg" alt="Our" onerror="imgFallback(this)"> Our
            </button>

                    <div class="person-label"><img src="我.jpg" alt="Kcc" onerror="imgFallback(this)"> Kcc</div>
                    <table>
                        <thead><tr><th>-</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th></tr></thead>
                        <tbody id="myTableBody"></tbody>
                    </table>
                </div>
                <div id="container-bao" class="schedule-container">
                    <div class="person-label"><img src="寶.jpg" alt="Lyz" onerror="imgFallback(this)"> Lyz</div>
                    <table>
                        <thead><tr><th>-</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th></tr></thead>
                        <tbody id="baoTableBody"></tbody>
                    </table>
                </div>
            </div>

        <!-- 視圖 B：今日課程 -->

                <div id="today-bao-col" class="today-col"></div>

        </div>
    </div>

    <script>
        const locationIcon = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`;
        const personIcon = `<svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`;
        const arrowDownIcon = `<svg class="expand-icon" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>`;

        const myData = [

            { period: "3", time: "10:10", endTime: "11:00", mon: "管理數學|吳蘭珍|藝408", tue: "物件導向系統分析與設計|徐國鈞|電703", wed: "資料庫管理系統實作|謝文欽|資402", thu: "生命教育|高君和|藝410", fri: "程式設計(二)|林俊杰|資401" },
            { period: "4", time: "11:10", endTime: "12:00", mon: "管理數學|吳蘭珍|藝408", tue: "物件導向系統分析與設計|徐國鈞|電703", wed: "資料庫管理系統實作|謝文欽|資402", thu: "生命教育|高君和|藝410", fri: "程式設計(二)|林俊杰|資401" },
            { period: "5", time: "13:30", endTime: "14:20", mon: "管理資訊系統|陳信宏|資402", tue: "體育二(下)|姜凱心|待排", wed: "電子商務與網路行銷|唐日新|電708", thu: "統計學(一)|賴蓉禾|藝410", fri: "" },
            { period: "6", time: "14:25", endTime: "15:15", mon: "管理資訊系統|陳信宏|資402", tue: "體育二(下)|姜凱心|待排", wed: "電子商務與網路行銷|唐日新|電708", thu: "統計學(一)|賴蓉禾|藝410", fri: "" },
            { period: "7", time: "15:25", endTime: "16:15", mon: "管理資訊系統|陳信宏|資402", tue: "希臘羅馬神話|簡士捷|藝410", wed: "電子商務與網路行銷|唐日新|電708", thu: "統計學(一)|賴蓉禾|藝410", fri: "" },
            { period: "8", time: "16:20", endTime: "17:10", mon: "", tue: "希臘羅馬神話|簡士捷|藝410", wed: "", thu: "", fri: "" }
        ];

        const baoData = [
            { period: "1", time: "08:10", endTime: "09:00", mon: "", tue: "", wed: "", thu: "", fri: "" },
            { period: "2", time: "09:10", endTime: "10:00", mon: "經濟學|王慶熙|藝409", tue: "", wed: "", thu: "Python程式設計|林宏仁|電707", fri: "" },
            { period: "3", time: "10:10", endTime: "11:00", mon: "經濟學|王慶熙|藝409", tue: "現代商業導論|蔡文隆|藝410", wed: "體育一(下)|李昭慶|待排", thu: "Python程式設計|林宏仁|電707", fri: "" },
            { period: "4", time: "11:10", endTime: "12:00", mon: "經濟學|王慶熙|藝409", tue: "現代商業導論|蔡文隆|藝410", wed: "體育一(下)|李昭慶|待排", thu: "Python程式設計|林宏仁|電707", fri: "" },
            { period: "5", time: "13:30", endTime: "14:20", mon: "微積分(二)|陳杏棻|藝409", tue: "英文(二)|簡士捷|藝410", wed: "大學國文選|翁燕玲|藝410", thu: "財務管理(一)|許慶文|藝403", fri: "" },
            { period: "6", time: "14:25", endTime: "15:15", mon: "微積分(二)|陳杏棻|藝409", tue: "英文(二)|簡士捷|藝410", wed: "大學國文選|翁燕玲|藝410", thu: "財務管理(一)|許慶文|藝403", fri: "" },
            { period: "7", time: "15:25", endTime: "16:15", mon: "微積分(二)|陳杏棻|藝409", tue: "資訊倫理與法律|林熙中|電606", wed: "", thu: "財務管理(一)|許慶文|藝403", fri: "服務學習|陳杏棻|藝410" },
            { period: "8", time: "16:20", endTime: "17:10", mon: "", tue: "資訊倫理與法律|林熙中|電606", wed: "", thu: "", fri: "服務學習|陳杏棻|藝410" }
        ];

        let currentPersonMode = 'my';
        let isMobileFrame = false;
        
        // 紀錄當前渲染的日期 (用來判斷是否過午夜換日)
        let lastRenderedDay = new Date().getDay();

        // 頁面載入時初始化
        window.onload = () => {
            renderGridTable('myTableBody', myData, 'my-item');
            renderGridTable('baoTableBody', baoData, 'bao-item');
            renderTodayView();
            
            // 啟動時鐘與自動更新機制
            tickTime();
            setInterval(tickTime, 1000);
        };

        // 每秒執行的心跳包：更新時鐘、跨日檢測、更新課程進度
        function tickTime() {
            const now = new Date();
            
            // 1. 更新右上角時鐘
            const daysArr = ['日', '一', '二', '三', '四', '五', '六'];
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            const dayStr = daysArr[now.getDay()];
            
            const hh = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('date-text').innerText = `${mm}/${dd} (週${dayStr})`;
            document.getElementById('time-text').innerText = `${hh}:${min}:${ss}`;

            // 2. 跨夜自動更新 (如果目前的星期跟上次渲染的星期不同，代表換日了)
            if (now.getDay() !== lastRenderedDay) {
                lastRenderedDay = now.getDay();
                renderTodayView(); // 重新繪製今日課程
            }

            // 3. 更新動態課程資料 (倒數計時與進度條)
            updateDynamicCourseData(now);
        }

        function toggleMobileFrame() {
            const app = document.getElementById('app-container');
            const btn = document.getElementById('frameToggleBtn');
            isMobileFrame = !isMobileFrame;
            if (isMobileFrame) {
                app.classList.add('mobile-frame');
                btn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg> 解除手機預覽`;
            } else {
                app.classList.remove('mobile-frame');
                btn.innerHTML = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg> 切換手機預覽`;
            }
        }

        function switchMainView(viewType) {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(t => t.classList.remove('active'));
            document.getElementById('view-grid').classList.remove('active');
            document.getElementById('view-list').classList.remove('active');

            if (viewType === 'grid') {
                tabs[0].classList.add('active');
                document.getElementById('view-grid').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('view-list').classList.add('active');
                renderTodayView(); 
            }
        }

        function showPersonMode(mode) {
            currentPersonMode = mode;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.querySelector('.btn-' + mode).classList.add('active');

            const wrapper = document.getElementById('mainWrapper');
            const cMy = document.getElementById('container-my');
            const cBao = document.getElementById('container-bao');

            if (mode === 'my') {
                wrapper.classList.remove('dual-view');
                cMy.classList.add('show'); cBao.classList.remove('show');
            } else if (mode === 'bao') {
                wrapper.classList.remove('dual-view');
                cMy.classList.remove('show'); cBao.classList.add('show');
            } else {
                wrapper.classList.add('dual-view');
                cMy.classList.add('show'); cBao.classList.add('show');
            }
            renderTodayView();
        }

        /* 渲染網格課表 */
        function renderGridTable(containerId, data, itemClass) {
            const tbody = document.getElementById(containerId);
            tbody.innerHTML = "";
            data.forEach(row => {
                let html = `<tr>
                    <td class="time-cell-grid">
                        <span class="p-num">${row.period}</span>
                        <span class="t-range">${row.time}<br>|<br>${row.endTime}</span>
                    </td>`;
                ["mon", "tue", "wed", "thu", "fri"].forEach(day => {
                    const info = row[day].split("|");
                    if (info.length > 1) {
                        html += `<td class="course-cell ${itemClass}">
                                    <span class="course-name">${info[0]}</span>
                                    <span class="instructor">${info[1]}</span>
                                    <span class="location">${info[2]}</span>
                                 </td>`;
                    } else {
                        html += `<td class="course-cell"></td>`;
                    }
                });
                html += `</tr>`;
                tbody.innerHTML += html;
            });
        }

        function toggleCard(cardElement) {
            cardElement.classList.toggle('expanded');
            updateDynamicCourseData(new Date()); 
        }

        function generateListHTML(data, dayKey) {
            let html = '';
            let hasClass = false;

            data.forEach(row => {
                if (row[dayKey]) {
                    hasClass = true;
                    const info = row[dayKey].split("|");
                    
                    html += `
                        <div class="list-card" data-start="${row.time}" data-end="${row.endTime}" onclick="toggleCard(this)">
                            <div class="list-card-main">
                                <div class="list-left">
                                    <div class="list-period">${row.period}</div>
                                    <div class="list-time">${row.time} - ${row.endTime}</div>
                                </div>
                                <div class="list-right">
                                    <div class="list-course-title">${info[0]}</div>
                                    <div class="list-details">
                                        <div class="detail-item">${locationIcon} ${info[2]}</div>
                                        <div class="detail-item">${personIcon} ${info[1]}</div>
                                    </div>
                                </div>
                                <div class="badge-container"></div>
                                ${arrowDownIcon}
                            </div>
                            <div class="list-card-extra">
                                <div class="countdown-text">計算中...</div>
                                <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>
                            </div>
                        </div>
                    `;
                }
            });

            if (!hasClass) return `<div class="empty-state">今天沒有排課程喔！開心去玩吧 🐾</div>`;
            return html;
        }

        function renderTodayView() {
            const myCol = document.getElementById('today-my-col');
            const baoCol = document.getElementById('today-bao-col');
            
            let dayIndex = new Date().getDay(); 
            const daysMap = {1: 'mon', 2: 'tue', 3: 'wed', 4: 'thu', 5: 'fri'};
            const currentDayKey = daysMap[dayIndex];

            myCol.innerHTML = ''; baoCol.innerHTML = '';

            // 如果是六、日（假日），直接顯示無課程
            if (!currentDayKey) {
                const weekendMsg = `<div class="empty-state">🎉 本日無課程！好好享受假日吧 🐾</div>`;
                
                myCol.innerHTML = `<div class="today-header-title"><img src="我.jpg" alt="Kcc" onerror="imgFallback(this)"> Kcc 的課</div>` + weekendMsg;
                baoCol.innerHTML = `<div class="today-header-title"><img src="寶.jpg" alt="Lyz" onerror="imgFallback(this)"> Lyz 的課</div>` + weekendMsg;

                if (currentPersonMode === 'my') {
                    myCol.classList.add('show'); baoCol.classList.remove('show');
                } else if (currentPersonMode === 'bao') {
                    myCol.classList.remove('show'); baoCol.classList.add('show');
                } else {
                    myCol.classList.add('show'); baoCol.classList.add('show');
                }
                return;
            }

            let myHtml = `<div class="today-header-title"><img src="我.jpg" alt="Kcc" onerror="imgFallback(this)"> Kcc 的課</div>`;
            myHtml += generateListHTML(myData, currentDayKey);
            myCol.innerHTML = myHtml;

            let baoHtml = `<div class="today-header-title"><img src="寶.jpg" alt="Lyz" onerror="imgFallback(this)"> Lyz 的課</div>`;
            baoHtml += generateListHTML(baoData, currentDayKey);
            baoCol.innerHTML = baoHtml;

            if (currentPersonMode === 'my') {
                myCol.classList.add('show'); baoCol.classList.remove('show');
            } else if (currentPersonMode === 'bao') {
                myCol.classList.remove('show'); baoCol.classList.add('show');
            } else {
                myCol.classList.add('show'); baoCol.classList.add('show');
            }

            updateDynamicCourseData(new Date());
        }

        function updateDynamicCourseData(now) {
            const cards = document.querySelectorAll('.list-card');
            if(cards.length === 0) return;

            cards.forEach(card => {
                const startStr = card.getAttribute('data-start');
                const endStr = card.getAttribute('data-end');
                if(!startStr || !endStr) return;

                const [sH, sM] = startStr.split(':').map(Number);
                const [eH, eM] = endStr.split(':').map(Number);
                
                let sDate = new Date(now); sDate.setHours(sH, sM, 0, 0);
                let eDate = new Date(now); eDate.setHours(eH, eM, 0, 0);

                const badgeContainer = card.querySelector('.badge-container');
                let status = 'upcoming';
                
                if (now > eDate) status = 'ended';
                else if (now >= sDate && now <= eDate) status = 'ongoing';

                // 更新 Badge 與 Card 狀態
                if(status === 'ongoing') {
                    if(!card.classList.contains('ongoing')) {
                        card.classList.add('ongoing'); card.classList.remove('ended', 'upcoming');
                        badgeContainer.innerHTML = `<div class="status-badge ongoing"><span class="dot"></span> 上課中</div>`;
                    }
                } else if (status === 'ended') {
                    if(!card.classList.contains('ended')) {
                        card.classList.add('ended'); card.classList.remove('ongoing', 'upcoming');
                        badgeContainer.innerHTML = `<div class="status-badge ended">已結束</div>`;
                    }
                } else {
                    if(!card.classList.contains('upcoming')) {
                        card.classList.add('upcoming'); card.classList.remove('ongoing', 'ended');
                        badgeContainer.innerHTML = `<div class="status-badge upcoming">即將到來</div>`;
                    }
                }

                // 當卡片被展開時，計算動態剩餘時間與進度條
                if (card.classList.contains('expanded')) {
                    const textEl = card.querySelector('.countdown-text');
                    const barEl = card.querySelector('.progress-bar-fill');

                    if (status === 'upcoming') {
                        let diffMs = sDate - now;
                        let diffMins = Math.ceil(diffMs / 60000);
                        let hours = Math.floor(diffMins / 60);
                        let mins = diffMins % 60;
                        textEl.innerHTML = `⏳ 距離上課還有 ${hours > 0 ? hours + ' 小時 ' : ''}${mins} 分鐘`;
                        barEl.style.width = '0%';
                        barEl.style.backgroundColor = 'var(--active-green)';
                    } else if (status === 'ongoing') {
                        let totalMs = eDate - sDate;
                        let passedMs = now - sDate;
                        let percent = (passedMs / totalMs) * 100;
                        let remainMins = Math.ceil((eDate - now) / 60000);
                        textEl.innerHTML = `🏃 上課中！還有 ${remainMins} 分鐘下課`;
                        barEl.style.width = `${percent}%`;
                        barEl.style.backgroundColor = 'var(--active-green)';
                    } else if (status === 'ended') {
                        textEl.innerHTML = `✅ 課程已結束，辛苦了！`;
                        barEl.style.width = '100%';
                        barEl.style.backgroundColor = '#ccc';
                    }
                }
            });
        }
